version: '3.8'

services:
  api:
    build:
      context: .
      target: final
    ports:
      - 5146:5146
    environment:
      - ASPNETCORE_URLS=http://+:5146
      - ConnectionStrings__DefaultConnection=Server=db;Database=db01_api_dotnet;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=BookCatalogAPI
      - Jwt__Audience=BookCatalogAPI
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1440:1433"
    volumes:
      - sqlData:/var/lib/sqlserver/Data
    healthcheck:
      test: >
        bash -c '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" -C ||
        /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1"'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s 

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafanaData:/var/lib/grafana
    depends_on:
      - elasticsearch

volumes:
  sqlData:
  grafanaData: